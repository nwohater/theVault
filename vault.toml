[vault]
name = "Slate Vault"
version = "0.1.0"

[sync]
remote_url = "https://github.com/nwohater/theVault.git"
remote_branch = "main"
pull_on_open = true
push_on_close = true

[mcp]
enabled = true
port = 3742
auto_stage_ai_writes = true
read_only = false
compress_context = true

[ai]
enabled = true
endpoint_url = "http://localhost:11434"
model = "llama3.1:8b"
